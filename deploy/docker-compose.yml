# Production stack for a shared host that already runs a reverse proxy.
# We run only the app + Postgres; the app is published on a loopback port and the
# host's existing Caddy (or other proxy) terminates TLS and routes the subdomain
# to it. Values come from a server-side .env file (see .env.example).

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: ghcr.io/kgdunn/scorepilot:latest
    # Forward the .env file so SCOREPILOT_* knobs (auth, docs, caps) reach the
    # container; non-prefixed keys (POSTGRES_*, APP_PORT) are ignored by the app.
    env_file: .env
    environment:
      # Set explicitly (not in .env) so the compose-interpolated credentials win.
      SCOREPILOT_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    # Publish on loopback only; the host reverse proxy reaches it here.
    # Override the host port with APP_PORT in .env if 8003 is taken.
    ports:
      - "127.0.0.1:${APP_PORT:-8003}:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
